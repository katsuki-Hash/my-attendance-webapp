<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勤怠アプリ</title>
</head>
<body>
  <h2>勤怠システム</h2>

  <button onclick="checkIn()">出勤</button>
  <button onclick="checkOut()">退勤</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhyibz0d9rpSx4gvuOpWKsPsKSU1bXZic",
      authDomain: "my-attendance-webapp.firebaseapp.com",
      projectId: "my-attendance-webapp"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const userId = "testUser";
    const today = new Date().toLocaleDateString("sv-SE");
    const docId = `${today}_${userId}`;

    window.checkIn = async () => {
      await setDoc(doc(db, "attendance", docId), {
        userId,
        checkIn: new Date(),
        status: "working"
      }, { merge: true });

      alert("出勤しました");
    };

    window.checkOut = async () => {
      await setDoc(doc(db, "attendance", docId), {
        userId,
        checkOut: new Date(),
        status: "done"
      }, { merge: true });

      alert("退勤しました");
    };
  </script>
</body>
</html>
